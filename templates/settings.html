{% extends "base.html" %}

{% block content %}
<div style="margin-bottom: 2rem;">
    <h1>System Settings</h1>
    <p style="color: var(--text-light);">Manage global application configurations.</p>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST">
        <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">General Settings</h3>
        
        <div class="form-group">
            <label class="form-label" for="lab_name">Lab Name / Brand Name <span style="color: var(--danger);">*</span></label>
            <input type="text" id="lab_name" name="lab_name" class="form-control" value="{{ lab_name }}" required>
            <small style="color: var(--text-light); display: block; margin-top: 0.25rem;">This name will appear on the dashboard, receipts, and printed reports.</small>
        </div>

        <div class="form-group" style="margin-top: 1rem;">
            <label class="form-label" for="lab_address">Short Address</label>
            <input type="text" id="lab_address" name="lab_address" class="form-control" value="{{ settings.get('lab_address', '') }}">
        </div>

        <div class="form-group" style="margin-top: 1rem;">
            <label class="form-label" for="lab_contact">Contact Number</label>
            <input type="text" id="lab_contact" name="lab_contact" class="form-control" value="{{ settings.get('lab_contact', '') }}">
        </div>
        
        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Save Settings</button>
        </div>
    </form>
</div>
{% endblock %}
